const REGIONS=["全部","金安区","裕安区","叶集区","霍邱县","舒城县","金寨县","霍山县","市直","其他"];
const STAGES=["全部","招标·采购公告","中标候选人","中标·成交结果","澄清·变更","其他"];
const PAGE_SIZE=25;
let VIEW=[],region="全部",stage="全部",page=1;
const MAXDATE=DATA.reduce((m,x)=>x.date>m?x.date:m,"0");
function daysAgo(n){const d=new Date(MAXDATE);d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function sCls(s){return s==="招标·采购公告"?"gonggao":s==="中标候选人"?"houxuan":s==="中标·成交结果"?"result":s==="澄清·变更"?"change":"other";}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function base(){const dv=document.getElementById("days").value,lim=dv==="9999"?"0":daysAgo(+dv);return DATA.filter(x=>x.date>=lim);}
function buildChips(){
  const B=base(),rc=document.getElementById("regionChips"),sc=document.getElementById("stageChips");
  rc.querySelectorAll(".chip").forEach(e=>e.remove());sc.querySelectorAll(".chip").forEach(e=>e.remove());
  REGIONS.forEach(r=>{const n=r==="全部"?B.length:B.filter(x=>x.region===r).length;if(r!=="全部"&&!n)return;
    const el=document.createElement("span");el.className="chip"+(r===region?" on":"");el.innerHTML=esc(r)+'<span class="c tnum">'+n+'</span>';el.onclick=()=>{region=r;page=1;apply();};rc.appendChild(el);});
  STAGES.forEach(s=>{const n=s==="全部"?B.length:B.filter(x=>x.stage===s).length;if(s!=="全部"&&!n)return;
    const el=document.createElement("span");el.className="chip"+(s===stage?" on":"");el.innerHTML=esc(s)+'<span class="c tnum">'+n+'</span>';el.onclick=()=>{stage=s;page=1;apply();};sc.appendChild(el);});
}
function apply(){
  const q=document.getElementById("q").value.trim(),sort=document.getElementById("sort").value;buildChips();
  VIEW=base().filter(x=>{if(region!=="全部"&&x.region!==region)return false;if(stage!=="全部"&&x.stage!==stage)return false;if(q&&x.title.indexOf(q)===-1)return false;return true;});
  VIEW.sort((a,b)=>sort==="asc"?(a.date<b.date?-1:1):(a.date>b.date?-1:1));render();
}
function render(){
  const list=document.getElementById("list"),total=VIEW.length,pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(page>pages)page=pages;const start=(page-1)*PAGE_SIZE,slice=VIEW.slice(start,start+PAGE_SIZE);
  document.getElementById("hcount").textContent=DATA.length;
  document.getElementById("count").textContent=total?`共 ${total} 个项目，显示第 ${start+1}–${Math.min(start+PAGE_SIZE,total)} 个`:"";
  if(!total){list.innerHTML='<div class="msg">该条件下暂无项目。可放宽时间窗口或清空筛选。</div>';document.getElementById("pager").innerHTML="";return;}
  list.innerHTML=slice.map((x,i)=>{const sc=sCls(x.stage);
    const kw=(x.keywords||[]).slice(0,4).map(k=>`<span class="kw">${esc(k)}</span>`).join("");
    const sumHtml=x.summary&&x.summary.length>=6?`<div class="sum">${esc(x.summary)}</div>`:`<div class="sum empty">该项目暂无文字摘要，点下方链接查看原文。</div>`;
    const tl=(x.timeline||[]).slice().reverse().map(t=>`<div class="tl-item"><span class="d tnum">${esc(t.date)}</span><span class="st stage-${sCls(t.stage)}">${esc(t.stage)}</span><a href="${t.url}" target="_blank" rel="noopener">查看公告 ↗</a></div>`).join("");
    return `<div class="row s-${sc}" id="r${i}">
      <div class="rhead" onclick="toggle(${i})">
        <div class="date tnum">${esc(x.date)}</div>
        <div class="body"><div class="title">${esc(x.title)}</div>
          <div class="meta"><span class="tag region">${esc(x.region)}</span><span class="tag stage stage-${sc}">${esc(x.stage)}</span>${kw}</div></div>
        <div class="go">›</div>
      </div>
      <div class="panel">
        ${sumHtml}
        <div class="pmeta">项目进度（共 ${x.docs} 份公告文件）：</div>
        <div class="tl">${tl}</div>
        <a class="open-orig" href="${x.url}" target="_blank" rel="noopener">打开当前公告 ↗</a>
      </div></div>`;}).join("");
  renderPager(pages);
}
function toggle(i){document.getElementById("r"+i).classList.toggle("open");}
function renderPager(pages){const p=document.getElementById("pager");if(pages<=1){p.innerHTML="";return;}
  let h=`<button ${page===1?"disabled":""} onclick="go(${page-1})">‹</button>`;
  for(let i=1;i<=pages;i++){if(i===1||i===pages||(i>=page-2&&i<=page+2))h+=`<button class="${i===page?"on":""}" onclick="go(${i})">${i}</button>`;else if(i===page-3||i===page+3)h+=`<span style="color:var(--muted)">…</span>`;}
  h+=`<button ${page===pages?"disabled":""} onclick="go(${page+1})">›</button>`;p.innerHTML=h;}
function go(n){page=n;render();window.scrollTo({top:0,behavior:"smooth"});}
function exportCsv(){
  const rows=[["当前状态日期","地区","当前状态","命中关键词","项目名称","摘要","当前公告链接"]];
  VIEW.forEach(x=>rows.push([x.date,x.region,x.stage,(x.keywords||[]).join(" "),x.title,x.summary,x.url]));
  const csv="\ufeff"+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\r\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="luan_water_tender.csv";a.click();
}
apply();
</script></body></html>
